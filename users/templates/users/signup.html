<!-- Extends base.html -->
{% extends 'base.html' %}

<!-- Page title block -->
{% block title %}Sign up | Barks{% endblock %}
<!-- Dynamic content block form base.html -->
{% block content %}
    <section class="auth-container">
    <h2>Create your account and start barking now!</h2>
    <!-- Create form with POST method to send user data to DB -->
    <form method="POST" class="auth-form">
    <!-- Token to check if form is sent by users from the site (not external) -->
    {%  csrf_token %}
    <!-- Template filer from the view "signup" to create all form fields and validations -->
    {{ form.as_p }}
    <button type="submit" class="btn-submit">Sign Up</button>
    </form>

    <div class="option-redir">
    <p>Do you already have an account? <a href="{% url 'login' %}">Log in here</a></p>
    </div>
</section>
{% endblock %}
